<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Settings</title>
  <script src="../assets/js/theme.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <link rel="stylesheet" href="../assets/css/dashboard.css" />
  <link rel="stylesheet" href="../assets/css/theme-dark.css" />
</head>
<body class="dash" data-admin-page="settings">
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <a href="/admin/index.html" class="brand"><span class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l1.5 3M12 2 10.5 5"/><path d="M8.5 9h7l1.5 12h-10z"/></svg></span> Lighthouse Admin</a>
      <div class="side-label">Admin</div>
      <nav class="side-nav">
        <a href="/admin/index.html">Dashboard</a>
        <a href="/admin/users.html">Users</a>
        <a href="/admin/scenarios.html">Scenarios</a>
        <a href="/admin/reports.html">Reports</a>
        <a href="/admin/analytics.html">Analytics</a>
        <a href="/admin/settings.html" class="active">Settings</a>
      </nav>
      <div class="side-foot"><button class="logout-btn" id="logoutBtn">Log out</button></div>
    </aside>
    <div class="overlay" id="overlay"></div>
    <div class="main">
      <header class="topbar">
        <button class="hamburger" id="hamburger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <div class="greeting"><h1>Admin Settings</h1><p>Theme and portal preferences</p></div>
        <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle theme"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg></button>
        <button class="user-chip"><span class="ava" id="userAva">A</span><span class="u-meta"><span class="u-name" id="userName">Admin</span><span class="u-role">Administrator</span></span></button>
      </header>
      <div class="content">
        <section class="settings-list rise">
          <div class="settings-row">
            <div><h4>Theme</h4><p>Applies across admin and user apps on this device</p></div>
            <button class="btn btn-primary" data-theme-toggle>Toggle Light / Dark</button>
          </div>
          <div class="settings-row">
            <div><h4>Role reminder</h4><p>Promote admins with SQL: UPDATE profiles SET role = 'admin' WHERE id = '…'</p></div>
          </div>
        </section>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"><span class="t-ic">✓</span><span id="toastMsg">OK</span></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/supabase-client.js"></script>
  <script src="../assets/js/shell.js"></script>
  <script src="../assets/js/admin.js"></script>
</body>
</html>
