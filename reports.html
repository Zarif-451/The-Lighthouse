<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports — Lighthouse</title>
  <script src="assets/js/theme.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/dashboard.css" />
  <link rel="stylesheet" href="assets/css/theme-dark.css" />
</head>
<body class="dash">
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <a href="dashboard.html" class="brand"><span class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l1.5 3M12 2 10.5 5"/><path d="M8.5 9h7l1.5 12h-10z"/></svg></span> Lighthouse</a>
      <div class="side-label">Menu</div>
      <nav class="side-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="checkins.html">Daily Check-ins</a>
        <a href="journal.html">Reflection Journal</a>
        <a href="insights.html">Insights</a>
        <a href="reports.html" class="active">Reports</a>
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
      </nav>

      <div class="side-foot"><button class="logout-btn" id="logoutBtn">Log out</button></div>
    </aside>
    <div class="overlay" id="overlay"></div>
    <div class="main">
      <header class="topbar">
        <button class="hamburger" id="hamburger"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <div class="greeting"><h1>Reports</h1><p>Weekly and monthly wellbeing summaries</p></div>
        <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle theme"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg></button>
        <button class="user-chip"><span class="ava" id="userAva">U</span><span class="u-meta"><span class="u-name" id="userName">User</span><span class="u-role">Personal account</span></span></button>
      </header>
      <div class="content" id="reportRoot">
        <div class="page-head rise">
          <div><h2>Reports</h2><p>Generated from your own Lighthouse activity</p></div>
          <div class="report-toolbar">
            <div class="chart-toggle" id="periodToggle">
              <button class="active" data-period="weekly">Weekly</button>
              <button data-period="monthly">Monthly</button>
            </div>
            <button class="btn btn-ghost" id="printBtn">Print Report</button>
            <button class="btn btn-outline" id="exportBtn">Export PDF</button>
          </div>
        </div>
        <section class="compare-grid rise" id="reportCards"></section>
        <section class="card card-pad rise">
          <div class="block-head"><div><h3 id="reportTitle">Weekly Report</h3><p id="reportRange"></p></div></div>
          <div class="behavior-grid" id="reportBars"></div>
        </section>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"><span class="t-ic">✓</span><span id="toastMsg">OK</span></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/shell.js"></script>
  <script src="assets/js/reports.js"></script>
</body>
</html>
